<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموظفين - KR MOH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #d81b60;
            --dark-bg: #000000;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-color: #ffffff; min-height: 100vh; color: #1f2937;
        }

        /* --- الهيدر الأسود الملكي --- */
        .header-black {
            background-color: var(--dark-bg);
            color: #fff;
            padding: 80px 20px 60px;
            text-align: center;
        }
        .header-black h1 { 
            font-size: 2.6rem; 
            margin: 0; 
            font-weight: 800;
        }
        .header-black p { 
            color: #d81b60; 
            margin: 10px 0 0; 
            font-size: 1.1rem;
            font-weight: 500;
        }

        .container { 
            max-width: 450px; 
            margin: 0 auto; 
            padding: 40px 20px 50px; 
        }

        .section-title {
            text-align: center;
            color: #311b22;
            font-size: 1.8rem;
            margin-bottom: 35px;
            font-weight: bold;
            position: relative;
        }
        
        /* خط تجميلي بسيط تحت العنوان باللون الوردي */
        .section-title::after {
            content: '';
            display: block;
            width: 40px;
            height: 3px;
            background: var(--primary-red);
            margin: 10px auto;
            border-radius: 10px;
        }

        /* --- أزرار الأنظمة --- */
        .emp-button {
            background: linear-gradient(135deg, #e91e63, #880e4f);
            color: white;
            padding: 24px;
            border-radius: 22px;
            margin-bottom: 18px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            text-decoration: none;
            display: block;
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.15);
            transition: 0.3s ease;
            border: none;
            width: 100%;
            box-sizing: border-box;
        }
        
        .emp-button:active { 
            transform: scale(0.96); 
            box-shadow: 0 4px 10px rgba(233, 30, 99, 0.1);
        }

    </style>
</head>
<body>

    <div class="header-black">
        <h1>بوابة الموظفين</h1>
        <p>وزارة الصحة | KR</p>
    </div>

    <div class="container">
        <h2 class="section-title">أنظمة الموظفين</h2>

        <a href="#" class="emp-button">قوانين وزارة الصحة</a>
        <a href="#" class="emp-button">جدول وزارة الصحة</a>
        <a href="#" class="emp-button">نظام الترقيات والنقاط</a>
    </div>

</body>
</html>
