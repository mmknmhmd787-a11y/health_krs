<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموظفين - KR MOH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* اللون العنابي الموحد من الشعار */
            --anaabi-color: #2d0a15; 
            --anaabi-light: #4a1022;
            --text-dark: #311b22;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            /* خلفية عنابية موحدة متدرجة بشكل بسيط وفخم */
            background: linear-gradient(180deg, var(--anaabi-color) 0%, var(--anaabi-light) 100%);
            background-attachment: fixed;
            min-height: 100vh; color: #fff;
            overflow-x: hidden;
        }

        /* --- الهيدر العنابي --- */
        .header-section {
            padding: 70px 20px 50px;
            text-align: center;
        }
        .header-section h1 { 
            font-size: 2.6rem; 
            margin: 0; 
            font-weight: 800; 
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .header-section p { 
            color: rgba(255,255,255,0.7); 
            margin: 10px 0 0; 
            font-size: 1.1rem; 
            font-weight: 500;
        }

        .container { max-width: 450px; margin: 0 auto; padding: 0 20px 50px; }

        /* --- الكروت البيضاء (كما طلبت) --- */
        .emp-card {
            background-color: #ffffff; /* خيارات باللون الأبيض */
            border-radius: 24px;
            padding: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            border: none;
            text-decoration: none; 
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            
            /* إعدادات الظهور التدريجي */
            opacity: 0;
            transform: translateY(25px);
        }
        
        .emp-card.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .emp-card:hover { 
            transform: translateY(-5px); 
            background-color: #f8f9fa;
        }
        
        .card-text { color: var(--text-dark); text-align: right; flex-grow: 1; margin-right: 15px; }
        .card-text h3 { margin: 0; font-size: 1.35rem; font-weight: 700; }
        .card-text p { margin: 4px 0 0; font-size: 0.9rem; color: #6d4c56; }
        
        /* الأيقونات العنابية داخل الكروت البيضاء */
        .card-icon {
            background-color: #fce4ec; 
            color: #880e4f; /* لون عنابي غامق للأيقونة ليبرز على الأبيض */
            width: 60px; height: 60px;
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

    </style>
</head>
<body>

    <div class="header-section">
        <h1>بوابة الموظفين</h1>
        <p>وزارة الصحة | KR</p>
    </div>

    <div class="container">
        
        <a href="#" class="emp-card">
            <div class="card-icon"><i class="fa-solid fa-book-medical"></i></div>
            <div class="card-text">
                <h3>قوانين وزارة الصحة</h3>
                <p>اللوائح والأنظمة الداخلية للموظفين</p>
            </div>
        </a>

        <a href="#" class="emp-card">
            <div class="card-icon"><i class="fa-regular fa-calendar-alt"></i></div>
            <div class="card-text">
                <h3>جدول وزارة الصحة</h3>
                <p>مواعيد العمل والجداول الزمنية</p>
            </div>
        </a>

        <a href="#" class="emp-card">
            <div class="card-icon"><i class="fa-solid fa-medal"></i></div>
            <div class="card-text">
                <h3>نظام الترقيات والنقاط</h3>
                <p>معايير الترقية وحساب النقاط الإدارية</p>
            </div>
        </a>
    </div>

    <script>
        // تأثير الظهور التدريجي الموزع بالوقت
        window.onload = () => {
            const cards = document.querySelectorAll('.emp-card');
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('reveal');
                }, (index + 1) * 200); 
            });
        };
    </script>

</body>
</html>
