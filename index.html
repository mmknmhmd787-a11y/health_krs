<div class="container">
    <div id="loginPage" class="card">
        <div class="icon-box"><i class="fa-solid fa-scale-balanced"></i></div>
        <h2>بوابة وزارة العدل</h2>
        <p class="subtitle">نظام الموظفين الرسمي لمجتمع KR</p>

        <form id="loginForm">
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" id="username" placeholder="name.kr" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="********" required>
                <div id="errorMessage"><i class="fa-solid fa-circle-exclamation"></i> كلمة المرور غير صحيحة!</div>
            </div>
            <button type="submit" class="btn">دخول اللوحة <i class="fa-solid fa-shield-halved"></i></button>
        </form>
    </div>

    <div id="dashboardPage" class="card hidden">
        <div class="icon-box" style="background: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.2);">
            <i class="fa-solid fa-user-check" style="color: #38bdf8;"></i>
        </div>
        <h2 style="color: #38bdf8;">مركز الإدارة</h2>
        <div class="user-info">
            <span class="status-badge">متصل</span>
            <p><strong>الموظف:</strong> <span id="displayUser"></span></p>
            <p style="margin: 0;"><strong>الرتبة:</strong> إدارة النظام (وزارة الصحة)</p>
        </div>
        <div class="options-grid">
            <a href="#" class="opt-button"><i class="fa-solid fa-book-medical"></i> <span>قوانين وزارة الصحة</span></a>
            <a href="#" class="opt-button"><i class="fa-solid fa-id-card-clip"></i> <span>مستند موظفين وزارة الصحة</span></a>
            <a href="#" class="opt-button"><i class="fa-solid fa-database"></i> <span>جدول بيانات وزارة الصحة</span></a>
        </div>
        <button onclick="location.reload()" class="btn" style="margin-top: 25px; background: #222; color: #fff;">تسجيل الخروج</button>
    </div>
</div>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
