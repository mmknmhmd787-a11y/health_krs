<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموظفين - KR MOH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #e91e63; /* لون الأيقونات */
            --navy-dark: #0f172a;    /* الكحلي الغامق (خلفية الكروت) */
            --navy-light: #1e293b;   /* كحلي أفتح قليلاً للتدرج */
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            /* --- خلفية متدرجة بالكحلي فقط بدون أسود --- */
            background: linear-gradient(180deg, var(--navy-dark) 0%, var(--navy-light) 100%);
            background-attachment: fixed;
            min-height: 100vh; color: #fff;
            overflow-x: hidden;
        }

        /* --- الهيدر بالكحلي الغامق جداً --- */
        .header-section {
            background-color: #0a0f1d;
            padding: 70px 20px 50px;
            text-align: center;
            border-bottom: 2px solid rgba(233, 30, 99, 0.2);
        }
        .header-section h1 { font-size: 2.6rem; margin: 0; font-weight: 800; color: #fff; }
        .header-section p { 
            color: var(--primary-pink); 
            margin: 10px 0 0; font-size: 1.1rem; font-weight: 500;
        }

        .container { max-width: 450px; margin: 0 auto; padding: 40px 20px 50px; }

        /* --- الكروت الموحدة بالكحلي --- */
        .emp-card {
            background-color: rgba(255, 255, 255, 0.05); /* شفافية بسيطة فوق الكحلي */
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none; 
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            /* إعدادات الظهور التدريجي */
            opacity: 0;
            transform: translateY(30px);
        }
        
        /* كلاس الظهور */
        .emp-card.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .emp-card:hover { 
            background-color: rgba(233, 30, 99, 0.1); 
            transform: translateY(-5px); 
            border-color: var(--primary-pink);
        }
        
        .card-text { color: #fff; text-align: right; flex-grow: 1; margin-right: 15px; }
        .card-text h3 { margin: 0; font-size: 1.35rem; font-weight: 700; }
        .card-text p { margin: 4px 0 0; font-size: 0.9rem; color: #94a3b8; }
        
        /* الأيقونات الوردية الموحدة */
        .card-icon {
            background-color: rgba(233, 30, 99, 0.15); 
            color: var(--primary-pink);
            width: 60px; height: 60px;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

    </style>
</head>
<body>

    <div class="header-section">
        <h1>بوابة الموظفين</h1>
        <p>وزارة الصحة | KR</p>
    </div>

    <div class="container">
        
        <a href="#" class="emp-card">
            <div class="card-icon"><i class="fa-solid fa-book-medical"></i></div>
            <div class="card-text">
                <h3>قوانين وزارة الصحة</h3>
                <p>اللوائح والأنظمة الداخلية للموظفين</p>
            </div>
        </a>

        <a href="#" class="emp-card">
            <div class="card-icon"><i class="fa-regular fa-calendar-alt"></i></div>
            <div class="card-text">
                <h3>جدول وزارة الصحة</h3>
                <p>مواعيد العمل والجداول الزمنية</p>
            </div>
        </a>

        <a href="#" class="emp-card">
            <div class="card-icon"><i class="fa-solid fa-medal"></i></div>
            <div class="card-text">
                <h3>نظام الترقيات والنقاط</h3>
                <p>معايير الترقية وحساب النقاط الإدارية</p>
            </div>
        </a>
    </div>

    <script>
        // تأثير الظهور التدريجي عند فتح الصفحة
        window.onload = () => {
            const cards = document.querySelectorAll('.emp-card');
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('reveal');
                }, (index + 1) * 250); // يظهر كرت كل ربع ثانية
            });
        };
    </script>

</body>
</html>
