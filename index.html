<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة وزارة الصحة | KR</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d120d;
            --card-bg: #121812;
            --primary-green: #4ade80;
            --btn-bg: rgba(74, 222, 128, 0.03);
            --btn-border: rgba(74, 222, 128, 0.1);
            --icon-bg: rgba(74, 222, 128, 0.1);
            --text-white: #e5e7eb;
            --accent-blue: #38bdf8;
            --error-red: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Tajawal', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        .container { width: 100%; max-width: 500px; }

        .card {
            background-color: var(--card-bg);
            padding: 40px 30px; border-radius: 24px;
            border: 1px solid #1a221a; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .hidden { display: none !important; }

        /* ستايل الأزرار الجديد المستوحى من image_4.png */
        .options-grid { display: grid; gap: 16px; margin-top: 30px; }

        .opt-button {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 20px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-white);
            text-decoration: none;
            transition: 0.3s ease;
            cursor: pointer;
            min-height: 80px;
        }

        .opt-button:hover {
            background: rgba(74, 222, 128, 0.08);
            border-color: var(--primary-green);
            transform: translateY(-2px);
        }

        /* أيقونة الملف اليمنى */
        .file-icon-box {
            background: var(--icon-bg);
            width: 55px; height: 55px;
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        .file-icon-box i { color: var(--primary-green); font-size: 22px; }

        /* النص في المنتصف */
        .btn-text {
            flex-grow: 1;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* أيقونة السهم اليسرى */
        .external-icon { color: var(--primary-green); font-size: 18px; opacity: 0.8; }

        /* ستايل تسجيل الدخول */
        .input-group { text-align: right; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #9ca3af; font-size: 0.9rem; }
        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #1f2937;
            background: #080a08; color: white; outline: none; box-sizing: border-box;
            font-family: inherit; font-size: 1rem; text-align: center;
        }
        .btn-submit {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--primary-green); color: #050705; font-weight: bold;
            cursor: pointer; font-size: 1rem; transition: 0.3s;
        }
        .btn-submit:hover { opacity: 0.9; transform: scale(0.98); }

        /* النافذة المنبثقة */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center;
            z-index: 1000; padding: 15px;
        }
        .modal-content {
            background: #0d120d; width: 100%; max-width: 600px; height: 85vh;
            border-radius: 24px; border: 1px solid var(--primary-green);
            padding: 25px; overflow-y: auto; text-align: right;
        }
        .law-item { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #1a221a; }
        .penalty { color: #f97316; font-size: 0.85rem; display: block; margin-top: 5px; }

    </style>
</head>
<body>

    <div class="container">
        <!-- صفحة الدخول -->
        <div id="loginPage" class="card">
            <h2 style="color: var(--primary-green); margin-bottom: 30px;">تسجيل الدخول الموحد</h2>
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder="اسم المستخدم" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="كلمة المرور" required>
                </div>
                <button type="submit" class="btn-submit">دخول النظام</button>
            </form>
            <p id="errorMessage" style="color: var(--error-red); display: none; margin-top: 15px; font-size: 0.9rem;">كلمة المرور خاطئة!</p>
        </div>

        <!-- لوحة التحكم -->
        <div id="dashboardPage" class="card hidden">
            <h2 style="color: var(--accent-blue); margin-bottom: 5px;">مركز الإدارة</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px;">مرحباً بك في لوحة تحكم وزارة الصحة</p>
            
            <div class="options-grid">
                
                <!-- خيار القوانين -->
                <div class="opt-button" onclick="showLaws()">
                    <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                    <span class="btn-text">قوانين وزارة الصحة</span>
                    <div class="file-icon-box"><i class="fa-solid fa-file-lines"></i></div>
                </div>

                <!-- خيار المستند (يمكنك إضافة رابط هنا) -->
                <a href="#" class="opt-button">
                    <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                    <span class="btn-text">مستند موظفين وزارة الصحة</span>
                    <div class="file-icon-box"><i class="fa-solid fa-file-medical"></i></div>
                </a>

                <!-- خيار جدول البيانات (الرابط الذي أرسلته) -->
                <a href="https://docs.google.com/spreadsheets/d/11bAJ_y1hhpOrgXrL0Chm3fwf5X7jSngZtC8ZgFf1nnk/edit?usp=drivesdk" target="_blank" class="opt-button">
                    <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                    <span class="btn-text">جدول بيانات وزارة الصحة</span>
                    <div class="file-icon-box"><i class="fa-solid fa-table"></i></div>
                </a>

            </div>

            <button onclick="location.reload()" style="background:none; border:none; color:var(--error-red); margin-top:30px; cursor:pointer; font-family:inherit;">تسجيل الخروج</button>
        </div>
    </div>

    <!-- نافذة القوانين -->
    <div id="lawsModal" class="modal">
        <div class="modal-content">
            <span onclick="hideLaws()" style="color:var(--error-red); cursor:pointer; float:left; font-size: 1.5rem;">&times;</span>
            <h2 style="color: var(--primary-green);">قوانين وزارة الصحة</h2>
            <div id="lawsList"></div>
        </div>
    </div>

    <script>
        const SECRET_KEY = "Krs123456&0";
        
        const laws = [
            { t: "الإحترام المتبادل بين منسوبي الوزارة والمواطنين.", p: "ملاحظة وتصل إلى الفصل" },
            { t: "يمنع تسريب أي معلومات تخص الوزارة خارج القنوات الرسمية.", p: "الفصل والمحاسبة الرقابية" },
            { t: "يمنع مباشرة العمل للمتدربين دون إذن رسمي.", p: "إنذار وتصل إلى الفصل" },
            { t: "يمنع المنشن العشوائي لقيادة الوزارة.", p: "إنذار وتصل إلى ملاحظة" },
            { t: "يمنع طلب الترقية أو المناصب بشكل مباشر.", p: "ملاحظة" },
            { t: "يمنع العمل دون التحصين الرسمي.", p: "ملاحظة" },
            { t: "يمنع التلاعب في سجلات الحضور والكشوفات.", p: "ملاحظة وتصل إلى الفصل" },
            { t: "يمنع قيادة الإسعاف لغير المصرح لهم.", p: "ملاحظة" }
            // ... يمكنك إكمال البقية هنا بنفس الطريقة
        ];

        window.onload = () => {
            const lawsList = document.getElementById('lawsList');
            laws.forEach((law, i) => {
                lawsList.innerHTML += `
                    <div class="law-item">
                        <b>${i+1} - ${law.t}</b>
                        <span class="penalty">العقوبة: ${law.p}</span>
                    </div>
                `;
            });
        };

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            if(document.getElementById('password').value === SECRET_KEY) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        };

        function showLaws() { document.getElementById('lawsModal').style.display = 'flex'; }
        function hideLaws() { document.getElementById('lawsModal').style.display = 'none'; }
    </script>
</body>
</html>
