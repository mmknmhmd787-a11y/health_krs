<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة وزارة العدل | KR</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0a0e0a;
            --card-bg: #111611;
            --primary-green: #4ade80;
            --error-red: #ef4444;
            --input-bg: #0d110d;
            --text-muted: #6b7280;
            --accent-blue: #38bdf8;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container { width: 100%; max-width: 450px; }

        .card {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid #1a201a;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hidden { display: none !important; }

        .icon-box {
            background: rgba(74, 222, 128, 0.1);
            width: 80px; height: 80px; margin: 0 auto 20px;
            border-radius: 15px; display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        .icon-box i { font-size: 40px; color: var(--primary-green); }

        h2 { color: var(--primary-green); font-size: 1.5rem; margin-bottom: 10px; }
        .subtitle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 25px; line-height: 1.5; }

        /* رسالة الترحيب الخاصة بالمستخدم العائد */
        #welcomeBack {
            color: var(--accent-blue);
            font-size: 0.9rem;
            margin-bottom: 15px;
            background: rgba(56, 189, 248, 0.1);
            padding: 10px;
            border-radius: 10px;
            display: none; /* مخفية افتراضياً */
        }

        .input-group { text-align: right; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #d1d5db; font-size: 0.9rem; }
        
        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #1f2937;
            background: var(--input-bg); color: white; outline: none; box-sizing: border-box;
            font-family: inherit; font-size: 1rem;
        }

        #errorMessage {
            color: var(--error-red); font-size: 0.8rem; margin-top: 10px; display: none;
            background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px;
        }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #22c55e, #166534);
            color: #000; font-weight: bold; cursor: pointer; font-size: 1rem;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: 0.3s;
        }

        .options-grid { display: grid; gap: 12px; margin-top: 25px; }
        .opt-button {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px; border-radius: 12px; color: #e5e7eb; text-decoration: none;
            display: flex; align-items: center; gap: 15px; font-size: 0.9rem;
        }
        .opt-button i { color: var(--primary-green); width: 20px; }

        .user-info {
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 12px; 
            margin-top: 15px; text-align: right; border-right: 3px solid var(--accent-blue);
        }
        .status-badge {
            background: var(--primary-green); color: black; padding: 2px 8px; 
            border-radius: 5px; font-size: 0.75rem; float: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginPage" class="card">
            <div class="icon-box"><i class="fa-solid fa-scale-balanced"></i></div>
            <h2>بوابة وزارة العدل</h2>
            <p class="subtitle">نظام الموظفين الرسمي لمجتمع KR</p>

            <div id="welcomeBack"></div>

            <form id="loginForm">
                <div class="input-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="username" placeholder="name.kr" required>
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" placeholder="********" required>
                    <div id="errorMessage"><i class="fa-solid fa-circle-exclamation"></i> كلمة المرور غير صحيحة!</div>
                </div>
                <button type="submit" class="btn">دخول لوحة التحكم <i class="fa-solid fa-lock"></i></button>
            </form>
        </div>

        <div id="dashboardPage" class="card hidden">
            <div class="icon-box" style="background: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.2);">
                <i class="fa-solid fa-user-shield" style="color: var(--accent-blue);"></i>
            </div>
            <h2 style="color: var(--accent-blue);">مركز الإدارة</h2>
            
            <div class="user-info">
                <span class="status-badge">متصل</span>
                <p><strong>الموظف:</strong> <span id="displayUser"></span></p>
                <p style="margin: 0;"><strong>الرتبة:</strong> إدارة النظام (وزارة الصحة)</p>
            </div>

            <div class="options-grid">
                <a href="#" class="opt-button"><i class="fa-solid fa-gavel"></i> <span>قوانين وزارة الصحة</span></a>
                <a href="#" class="opt-button"><i class="fa-solid fa-users-gear"></i> <span>مستند موظفين وزارة الصحة</span></a>
                <a href="#" class="opt-button"><i class="fa-solid fa-table-list"></i> <span>جدول بيانات وزارة الصحة</span></a>
            </div>

            <button onclick="location.reload()" class="btn" style="margin-top: 25px; background: #222; color: #fff; border: 1px solid #333;">تسجيل الخروج</button>
        </div>
    </div>

    <script>
        const SECRET_KEY = "Krs123456&0"; 
        const loginForm = document.getElementById('loginForm');
        const loginPage = document.getElementById('loginPage');
        const dashboardPage = document.getElementById('dashboardPage');
        const errorMsg = document.getElementById('errorMessage');
        const passField = document.getElementById('password');
        const userField = document.getElementById('username');
        const welcomeBackMsg = document.getElementById('welcomeBack');

        // عند فتح الصفحة: هل هناك اسم مستخدم محفوظ؟
        window.onload = () => {
            const lastUser = localStorage.getItem('lastKRUser');
            if (lastUser) {
                welcomeBackMsg.style.display = 'block';
                welcomeBackMsg.innerHTML = `<i class="fa-solid fa-hand-wave"></i> مرحباً بك مجدداً يا <b>${lastUser}</b>`;
                userField.value = lastUser; // تعبئة الاسم تلقائياً
            }
        };

        loginForm.onsubmit = (e) => {
            e.preventDefault(); 
            const userVal = userField.value;
            if (passField.value === SECRET_KEY) {
                // حفظ اسم المستخدم في ذاكرة المتصفح
                localStorage.setItem('lastKRUser', userVal);
                
                document.getElementById('displayUser').innerText = userVal;
                loginPage.classList.add('hidden');
                dashboardPage.classList.remove('hidden');
            } else {
                errorMsg.style.display = 'block';
                passField.value = "";
            }
        };
    </script>
</body>
</html>
