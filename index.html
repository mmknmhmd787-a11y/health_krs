<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموظفين - KR MOH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* --- توحيد الألوان بناءً على الصورة المرسلة --- */
            --primary-blue: #3b82f6; /* الأزرق الكهربائي المشرق */
            --dark-navy: #0f172a;    /* الكحلي الغامق جداً */
            --deep-black: #050509;   /* خلفية سوداء شبه تامة */
            --text-gray: #94a3b8;   /* رمادي خفيف للشرح الفرعي */
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-color: var(--deep-black); 
            min-height: 100vh; color: #fff;
            overflow-x: hidden;
            
            /* --- إضافة تأثير الشبكة التقنية في الخلفية مثل الصورة --- */
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; /* حجم الشبكة */
        }

        /* --- الهيدر العصري --- */
        .header-section {
            background-color: var(--deep-black);
            padding: 70px 20px 50px;
            text-align: center;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
        }
        .header-section h1 { font-size: 2.6rem; margin: 0; font-weight: 800; color: #fff; }
        .header-section p { 
            color: var(--primary-blue); 
            margin: 10px 0 0; font-size: 1.1rem; font-weight: 500;
        }

        .container { max-width: 450px; margin: 0 auto; padding: 40px 20px 50px; }

        /* --- الكروت الموحدة بالأزرق الداكن --- */
        .emp-card {
            background-color: var(--dark-navy);
            border-radius: 20px; /* زوايا أقل انحناءً لستايل مودرن */
            padding: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.03); /* إطار شفاف جداً */
            text-decoration: none; 
            cursor: pointer;
            transition: 0.4s ease-out;
            
            /* إعدادات الظهور التدريجي */
            opacity: 0;
            transform: translateY(20px);
        }
        
        /* كلاس الظهور */
        .emp-card.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        /* تأثير التمرير باللون الأزرق */
        .emp-card:hover { 
            background-color: #1a253d; 
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); /* تأثير توهج أزرق */
        }
        
        .card-text { color: #fff; text-align: right; flex-grow: 1; margin-right: 15px; }
        .card-text h3 { margin: 0; font-size: 1.35rem; font-weight: 700; color: #fff; }
        .card-text p { margin: 4px 0 0; font-size: 0.9rem; color: var(--text-gray); }
        
        /* الأيقونات الزرقاء الموحدة (مثل الصورة) */
        .card-icon {
            background-color: rgba(59, 130, 246, 0.1); /* خلفية زرقاء شفافة */
            color: var(--primary-blue);
            width: 60px; height: 60px;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

    </style>
</head>
<body>

    <div class="header-section">
        <h1>بوابة الموظفين</h1>
        <p>وزارة الصحة | KR</p>
    </div>

    <div class="container">
        
        <a href="#" class="emp-card">
            <div class="card-icon"><i class="fa-solid fa-book-medical"></i></div>
            <div class="card-text">
                <h3>قوانين وزارة الصحة</h3>
                <p>اللوائح والأنظمة الداخلية للموظفين</p>
            </div>
        </a>

        <a href="#" class="emp-card">
            <div class="card-icon"><i class="fa-regular fa-calendar-alt"></i></div>
            <div class="card-text">
                <h3>جدول وزارة الصحة</h3>
                <p>مواعيد العمل والجداول الزمنية</p>
            </div>
        </a>

        <a href="#" class="emp-card">
            <div class="card-icon"><i class="fa-solid fa-medal"></i></div>
            <div class="card-text">
                <h3>نظام الترقيات والنقاط</h3>
                <p>معايير الترقية وحساب النقاط الإدارية</p>
            </div>
        </a>
    </div>

    <script>
        // تأثير الظهور التدريجي عند فتح الصفحة
        window.onload = () => {
            const cards = document.querySelectorAll('.emp-card');
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('reveal');
                }, (index + 1) * 200); // يظهر كرت كل خمس ثانية (أسرع قليلاً)
            });
        };
    </script>

</body>
</html>
