<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموظفين - KR MOH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* --- توحيد الألوان بناءً على الشعار المرسل --- */
            --primary-pink: #d81b60; /* وردي غامق للأيقونات */
            --dark-pink: #2d0a15;   /* كحلي عنابي غامق للكروت */
            --pink-gradient: linear-gradient(180deg, #f8c8d3 0%, #f9e1e7 100%); /* تدرج الخلفية */
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            /* خلفية متدرجة وردية هادئة لتوحيد الألوان */
            background: var(--pink-gradient);
            background-attachment: fixed;
            min-height: 100vh; color: #1f2937;
            overflow-x: hidden;
        }

        /* --- الهيدر بالكحلي العنابي الغامق (مثل خلفية الصورة) --- */
        .header-section {
            background-color: var(--dark-pink);
            padding: 70px 20px 50px;
            text-align: center;
            border-bottom: 2px solid rgba(233, 30, 99, 0.2);
        }
        .header-section h1 { font-size: 2.6rem; margin: 0; font-weight: 800; color: #fff; }
        .header-section p { 
            color: var(--primary-pink); 
            margin: 10px 0 0; font-size: 1.1rem; font-weight: 500;
        }

        .container { max-width: 450px; margin: 0 auto; padding: 40px 20px 50px; }

        /* --- الكروت الموحدة التصميم بالكحلي العنابي --- */
        .emp-card {
            background-color: #ffffff; /* جعل خلفية الكرت بيضاء سادة */
            border-radius: 28px;
            padding: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid rgba(233, 30, 99, 0.05); /* إطار شفاف جداً */
            text-decoration: none; 
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            /* إعدادات الظهور التدريجي */
            opacity: 0;
            transform: translateY(30px);
        }
        
        /* كلاس الظهور */
        .emp-card.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .emp-card:hover { 
            background-color: #fce4ec; /* خلفية وردية فاتحة جداً عند التمرير */
            transform: translateY(-5px); 
            border-color: var(--primary-pink);
        }
        
        .card-text { color: #1f2937; text-align: right; flex-grow: 1; margin-right: 15px; }
        .card-text h3 { margin: 0; font-size: 1.35rem; font-weight: 700; color: #311b22; }
        .card-text p { margin: 4px 0 0; font-size: 0.9rem; color: #5c4048; }
        
        /* الأيقونات الوردية الغامقة الموحدة */
        .card-icon {
            background-color: #f8bbd0; /* خلفية وردية فاتحة جداً للأيقونة */
            color: var(--primary-pink);
            width: 60px; height: 60px;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

    </style>
</head>
<body>

    <div class="header-section">
        <h1>بوابة الموظفين</h1>
        <p>وزارة الصحة | KR</p>
    </div>

    <div class="container">
        
        <a href="#" class="emp-card">
            <div class="card-icon"><i class="fa-solid fa-book-medical"></i></div>
            <div class="card-text">
                <h3>قوانين وزارة الصحة</h3>
                <p>اللوائح والأنظمة الداخلية للموظفين</p>
            </div>
        </a>

        <a href="#" class="emp-card">
            <div class="card-icon"><i class="fa-regular fa-calendar-alt"></i></div>
            <div class="card-text">
                <h3>جدول وزارة الصحة</h3>
                <p>مواعيد العمل والجداول الزمنية</p>
            </div>
        </a>

        <a href="#" class="emp-card">
            <div class="card-icon"><i class="fa-solid fa-medal"></i></div>
            <div class="card-text">
                <h3>نظام الترقيات والنقاط</h3>
                <p>معايير الترقية وحساب النقاط الإدارية</p>
            </div>
        </a>
    </div>

    <script>
        // تأثير الظهور التدريجي عند فتح الصفحة
        window.onload = () => {
            const cards = document.querySelectorAll('.emp-card');
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('reveal');
                }, (index + 1) * 250); // يظهر كرت كل ربع ثانية
            });
        };
    </script>

</body>
</html>
