<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة وزارة الصحة | KR</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d120d;
            --card-bg: #121812;
            --primary-green: #4ade80;
            --btn-bg: rgba(74, 222, 128, 0.03);
            --btn-border: rgba(74, 222, 128, 0.1);
            --icon-bg: rgba(74, 222, 128, 0.1);
            --text-white: #e5e7eb;
            --accent-blue: #38bdf8;
            --error-red: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Tajawal', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        .container { width: 100%; max-width: 500px; }

        .card {
            background-color: var(--card-bg);
            padding: 40px 30px; border-radius: 24px;
            border: 1px solid #1a221a; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .hidden { display: none !important; }

        .options-grid { display: grid; gap: 14px; margin-top: 30px; }

        .opt-button {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 20px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-white);
            text-decoration: none;
            transition: 0.3s ease;
            cursor: pointer;
            min-height: 75px;
        }

        .opt-button:hover {
            background: rgba(74, 222, 128, 0.08);
            border-color: var(--primary-green);
            transform: translateY(-2px);
        }

        .file-icon-box {
            background: var(--icon-bg);
            width: 50px; height: 50px;
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        .file-icon-box i { color: var(--primary-green); font-size: 20px; }

        .btn-text {
            flex-grow: 1;
            text-align: center;
            font-size: 1rem;
            font-weight: 500;
        }

        .external-icon { color: var(--primary-green); font-size: 16px; opacity: 0.7; }

        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #1f2937;
            background: #080a08; color: white; outline: none; box-sizing: border-box;
            font-family: inherit; font-size: 1rem; text-align: center; margin-bottom: 15px;
        }
        .btn-submit {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--primary-green); color: #050705; font-weight: bold;
            cursor: pointer; font-size: 1rem;
        }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center;
            z-index: 1000; padding: 15px;
        }
        .modal-content {
            background: #0d120d; width: 100%; max-width: 600px; height: 80vh;
            border-radius: 24px; border: 1px solid var(--primary-green);
            padding: 25px; overflow-y: auto; text-align: right;
        }
        .law-item { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #1a221a; }
    </style>
</head>
<body>

    <div class="container">
        <!-- صفحة الدخول -->
        <div id="loginPage" class="card">
            <h2 style="color: var(--primary-green); margin-bottom: 30px;">وزارة العدل | KR</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="اسم المستخدم" required>
                <input type="password" id="password" placeholder="كلمة المرور" required>
                <button type="submit" class="btn-submit">دخول</button>
            </form>
            <p id="errorMessage" style="color: var(--error-red); display: none; margin-top: 15px;">كلمة المرور خاطئة!</p>
        </div>

        <!-- لوحة التحكم المحدثة بالخيارات الجديدة -->
        <div id="dashboardPage" class="card hidden">
            <h2 style="color: var(--accent-blue); margin-bottom: 5px;">مركز الإدارة</h2>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 25px;">بوابة وزارة الصحة الموحدة</p>
            
            <div class="options-grid">
                
                <!-- قوانين وزارة الصحة -->
                <div class="opt-button" onclick="showLaws()">
                    <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                    <span class="btn-text">قوانين وزارة الصحة</span>
                    <div class="file-icon-box"><i class="fa-solid fa-file-shield"></i></div>
                </div>

                <!-- جدول بيانات وزارة الصحة -->
                <a href="https://docs.google.com/spreadsheets/d/11bAJ_y1hhpOrgXrL0Chm3fwf5X7jSngZtC8ZgFf1nnk/edit?usp=drivesdk" target="_blank" class="opt-button">
                    <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                    <span class="btn-text">جدول بيانات وزارة الصحة</span>
                    <div class="file-icon-box"><i class="fa-solid fa-table"></i></div>
                </a>

                <!-- الترقيات والتعيينات -->
                <a href="https://discord.com/channels/851534602576461854/851534608729374777" target="_blank" class="opt-button">
                    <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                    <span class="btn-text">الترقيات والتعيينات</span>
                    <div class="file-icon-box"><i class="fa-solid fa-user-plus"></i></div>
                </a>

                <!-- الإجازات والاستقالات -->
                <a href="https://discord.com/channels/851534602576461854/851534608729374775" target="_blank" class="opt-button">
                    <i class="fa-solid fa-arrow-up-right-from-square external-icon"></i>
                    <span class="btn-text">الإجازات والاستقالات</span>
                    <div class="file-icon-box"><i class="fa-solid fa-calendar-xmark"></i></div>
                </a>

            </div>

            <button onclick="location.reload()" style="background:none; border:none; color:var(--error-red); margin-top:25px; cursor:pointer; font-family:inherit;">تسجيل الخروج</button>
        </div>
    </div>

    <!-- نافذة القوانين -->
    <div id="lawsModal" class="modal">
        <div class="modal-content">
            <span onclick="hideLaws()" style="color:var(--error-red); cursor:pointer; float:left; font-size: 1.5rem;">&times;</span>
            <h2 style="color: var(--primary-green);">لائحة القوانين</h2>
            <div id="lawsList"></div>
        </div>
    </div>

    <script>
        const SECRET_KEY = "Krs123456&0";
        
        // قوانين الوزارة الـ 25
        const laws = [
            { t: "الاحترام المتبادل بين المنسوبين والمواطنين.", p: "ملاحظة وتصل للفصل" },
            { t: "يمنع تسريب معلومات الوزارة للخارج.", p: "الفصل والمحاسبة" },
            { t: "يمنع مباشرة العمل للمتدرب دون إذن.", p: "إنذار وتصل للفصل" },
            { t: "يمنع المنشن لغير الشكاوى الرسمية.", p: "ملاحظة" },
            { t: "يمنع طلب الترقية أو المناصب.", p: "ملاحظة" },
            { t: "يمنع العمل دون تحصين رسمي.", p: "ملاحظة" },
            { t: "يمنع التلاعب في سجلات الحضور.", p: "ملاحظة وتصل للفصل" },
            { t: "يمنع قيادة الإسعاف لغير المصرح لهم.", p: "ملاحظة" },
            { t: "يمنع طلب الاستقالة قبل ترقيتين كصحي معتمد.", p: "رفض الاستقالة" },
            { t: "يمنع استلام أكثر من موعد في وقت واحد.", p: "ملاحظة" },
            { t: "يمنع إزعاج الموارد البشرية بشأن النقاط.", p: "ملاحظة" },
            { t: "يمنع السؤال عن دورات الهلال الأحمر.", p: "بلاك لست مؤقت" },
            { t: "يمنع السؤال عن نتائج التقديم.", p: "بلاك لست مؤقت" },
            { t: "يجب طلب إجازة عند التغيب عن التفاعل.", p: "محاسبة نظام العقوبات" },
            { t: "عدم التفاعل لشهر يؤدي لتنتيل الرتبة.", p: "الفصل عند بلوغ 45 يوم" },
            { t: "يمنع طلب حجز موعد من شخص آخر.", p: "إنذار" },
            { t: "يجب التحمد بالسلامة بعد الإنعاش.", p: "ملاحظة (تقمص)" },
            { t: "يجب تشغيل أضواء الطوارئ عند المباشرة.", p: "ملاحظة وتنتيل" },
            { t: "يمنع الإنعاش في مناطق إطلاق النار النشطة.", p: "ملاحظة وتنتيل" },
            { t: "يجب التواجد في كل حالة عند إعلانها بالبلاغات.", p: "ملاحظة" },
            { t: "يجب دخول راديو وزارة الصحة والالتزام.", p: "ملاحظة" },
            { t: "يشترط توفر طاقم كامل للمباشرة بالإسعاف.", p: "ملاحظة" },
            { t: "يمنع القيام بعمل تخصص غيرك.", p: "إنذار شفهي ثم ملاحظة" },
            { t: "الالتزام بمستند نظام التخصصات الصحي.", p: "ملاحظة وتنتيل" },
            { t: "يمنع أخذ مبالغ مالية من المواطنين.", p: "ملاحظة" }
        ];

        window.onload = () => {
            const lawsList = document.getElementById('lawsList');
            laws.forEach((law, i) => {
                lawsList.innerHTML += `
                    <div class="law-item">
                        <b>${i+1} - ${law.t}</b>
                        <span style="color:#f97316; display:block; font-size:0.8rem;">العقوبة: ${law.p}</span>
                    </div>
                `;
            });
        };

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            if(document.getElementById('password').value === SECRET_KEY) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        };

        function showLaws() { document.getElementById('lawsModal').style.display = 'flex'; }
        function hideLaws() { document.getElementById('lawsModal').style.display = 'none'; }
    </script>
</body>
</html>
