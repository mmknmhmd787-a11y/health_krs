<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموظفين | KR</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #d83a5e;
            --dark-red: #8e1f3d;
            --gold: #c5a059;
            --bg-gray: #f8f9fa;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-gray);
            margin: 0; padding: 0;
            color: #333; text-align: center;
            overflow-x: hidden;
        }

        .header-banner {
            background-color: #000; 
            padding: 45px 20px;
            margin-bottom: 30px;
            border-bottom: 4px solid var(--gold);
        }

        .header-banner h2 {
            margin: 0; 
            font-size: 30px; 
            color: #ffffff; 
            font-weight: 700;
        }

        .header-banner p {
            margin: 8px 0 0; 
            font-size: 14px; 
            color: var(--gold); 
            letter-spacing: 1px;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: auto;
            padding-bottom: 50px;
        }

        .section-title {
            font-size: 24px;
            color: var(--dark-red);
            margin-top: 40px;
            margin-bottom: 20px;
            font-weight: 700;
            position: relative;
            display: inline-block;
            padding-bottom: 5px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 50px; height: 3px;
            background: var(--gold);
        }

        .btn {
            display: block;
            text-decoration: none;
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            color: white;
            padding: 18px 25px;
            margin: 15px 0;
            border-radius: 18px;
            font-size: 19px;
            font-weight: 600;
            box-shadow: 0 6px 15px rgba(216, 58, 94, 0.2);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(142, 31, 61, 0.3);
            filter: brightness(1.1);
        }

        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .d1 { animation-delay: 0.1s; }
        .d2 { animation-delay: 0.2s; }
        .d3 { animation-delay: 0.3s; }
        .d4 { animation-delay: 0.4s; }
        .d5 { animation-delay: 0.5s; }
        .d6 { animation-delay: 0.6s; }
        .d7 { animation-delay: 0.7s; }
        .d8 { animation-delay: 0.8s; }

    </style>
</head>
<body>

    <div class="header-banner">
        <h2>بوابة الموظفين</h2>
        <p>وزارة الصحة | KR</p>
    </div>

    <div class="container">

        <div class="section-title fade-in">أنظمة الموظفين</div>

        <!-- تم التعديل هنا -->
        <a class="btn fade-in d1" href="#">قوانين وزارة الصحة</a>
        <a class="btn fade-in d2" href="#">جدول وزارة الصحة</a>

        <a class="btn fade-in d3" href="points.html">نظام الترقيات والنقاط</a>
        <a class="btn fade-in d4" href="#">نظام العقوبات</a>
        <a class="btn fade-in d5" href="#">نماذج وزارة الصحة</a>

        <div class="section-title fade-in" style="margin-top: 50px;">القطاعات الصحية</div>

        <a class="btn fade-in d6" href="https://forms.gle/5wxMD6gmJKsxs2BU9" target="_blank">تقديم الهلال الأحمر</a>
        <a class="btn fade-in d7" href="https://forms.gle/mHqBV3EQ9HDZ4cok7" target="_blank">تقديم إدارة الشؤون الصحية</a>
        <a class="btn fade-in d8" href="https://forms.gle/495RqKFkQiere2kNA" target="_blank">تقديم مدربين وزارة الصحة</a>

    </div>

</body>
</html>
